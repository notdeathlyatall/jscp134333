<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time form validation</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        fieldset{
            width: 400px;
            margin: 50px auto;
        }
        .loginForm{
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .row{
            display: flex;
            flex-direction: column;
            gap: 10px;
            font: 20px/1.5 "Courier New", Courier, monospace;
        }
        b{
            font-family: monospace;
            font: 20px/1.5 "Courier New", Courier, monospace;
        }
        .box {

width: 420px;

margin: auto;

border: 2px solid #bbb;

padding: 18px;

}

.row {

display: flex;

align-items: center;

justify-content: center;

gap: 10px;

margin: 10px 0;

}

label {

width: 90px;

text-align: right;

font-size: 18px;

}

input {

height: 24px;

padding: 4px;

border: 1px solid #999;

}

#email,

#password {

width: 170px;

}

#age {

width: 55px;

}

button {

margin-top: 10px;

padding: 4px 14px;

cursor: pointer;

}

#message {

margin-top: 20px;

font-size: 22px;

font-weight: 500;

}
    </style>
</head>
<body>
    <fieldset>
        <form id="loginForm">
            <legend><b>Real-time form validation using JS</b></legend>
            <div class="row">
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Y0UR email here">
            </div>
            <div class="row">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Y0UR password here">
            </div>
            <div class="row">
                <label for="age">Age:</label>
                <input type="number" id="age" placeholder="Y0UR age here">
            </div>
            <button type="submit">Submit</button>
        </form>
    </fieldset>
    <script src="script3.js"></script>
</body>
</html>
